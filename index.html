<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memoria Creativa — Juego Premium</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d001f;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 100vh;
    padding: 24px 12px 40px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }

  #gc {
    width: 100%;
    max-width: 720px;
    background: #1a0533;
    border-radius: 20px;
    border: 3px solid #e040fb;
    padding: 1.5rem 1rem 2rem;
    position: relative;
    overflow: hidden;
  }

  #gc::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, #3d0068 0%, transparent 55%),
      radial-gradient(circle at 80% 80%, #001a66 0%, transparent 55%);
    pointer-events: none;
  }

  #scanlines {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.13) 3px, rgba(0,0,0,0.13) 4px
    );
  }

  #stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .star { position: absolute; background: #fff; border-radius: 50%; }

  #content { position: relative; z-index: 2; }

  /* TÍTULO */
  #hdr { text-align: center; margin-bottom: 1.25rem; }
  #game-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 15px;
    color: #fff;
    text-shadow: 0 0 10px #e040fb, 0 0 22px #e040fb, 0 0 2px #fff;
    letter-spacing: .05em;
    line-height: 1.7;
    margin-bottom: 6px;
  }
  #game-title span { color: #facc15; text-shadow: 0 0 10px #facc15, 0 0 22px #f59e0b; }
  #game-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 7px; color: #a78bfa; letter-spacing: .12em; margin-top: 4px;
  }

  /* STATS */
  #stats { display: flex; justify-content: center; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat {
    background: #0d0020; border: 1.5px solid #7c3aed;
    border-radius: 8px; padding: 6px 14px; text-align: center; min-width: 72px;
  }
  .stat-v {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px; color: #facc15; text-shadow: 0 0 8px #facc15;
  }
  .stat-l {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px; color: #a78bfa; margin-top: 4px; letter-spacing: .08em;
  }

  /* LEYENDA */
  #legend { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  .leg { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 4px 10px; border-radius: 6px; letter-spacing: .06em; }
  .leg-c { background: #1e3a6e; color: #93c5fd; border: 1px solid #3b82f6; }
  .leg-m { background: #14402a; color: #6ee7b7; border: 1px solid #10b981; }

  /* TABLERO */
  #board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    max-width: 660px;
    margin: 0 auto;
  }

  /* TARJETAS */
  .card { height: 98px; cursor: pointer; perspective: 900px; position: relative; }
  .ci {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform .5s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped .ci, .card.matched .ci { transform: rotateY(180deg); }

  .cf, .cb {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px; padding: 8px 6px; text-align: center;
  }
  .cf {
    background: #0d0020; border: 2px solid #7c3aed; overflow: hidden;
    transition: border-color .2s, box-shadow .2s;
  }
  .cf:hover { border-color: #e040fb; box-shadow: 0 0 14px #e040fb55; }
  .cf-grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(#7c3aed22 1px, transparent 1px),
      linear-gradient(90deg, #7c3aed22 1px, transparent 1px);
    background-size: 14px 14px;
  }
  .cf-icon {
    font-size: 26px; color: #e040fb; position: relative; z-index: 1;
    text-shadow: 0 0 10px #e040fb;
  }
  .cf-lbl {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px; color: #7c3aed; position: relative; z-index: 1; letter-spacing: .1em;
  }

  .cb { transform: rotateY(180deg); }
  .cb.concept { background: #0c1e40; border: 2px solid #3b82f6; }
  .cb.meaning  { background: #0a2318; border: 2px solid #10b981; }

  .cb-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 6px; padding: 2px 8px; border-radius: 99px; letter-spacing: .06em;
  }
  .cb.concept .cb-badge { background: #1e3a6e; color: #93c5fd; }
  .cb.meaning  .cb-badge { background: #14402a; color: #6ee7b7; }

  .cb-text { font-size: 10px; font-weight: 500; line-height: 1.3; padding: 0 3px; }
  .cb.concept .cb-text { color: #dbeafe; }
  .cb.meaning  .cb-text { color: #d1fae5; }

  .card.matched .cb {
    background: #1a3a0a; border: 2px solid #facc15;
    box-shadow: 0 0 14px #facc1566;
  }
  .card.matched .cb-text  { color: #fefce8; }
  .card.matched .cb-badge { background: #713f12; color: #facc15; }

  .card.wrong { animation: shake .35s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-5px); }
    75%      { transform: translateX(5px); }
  }
  .card.matched .ci { animation: pop .4s ease; }
  @keyframes pop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.08); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* TOAST */
  #toast-wrap { position: relative; min-height: 80px; margin-top: 14px; }
  #toast {
    display: none;
    background: #0d0020; border: 2px solid #facc15;
    box-shadow: 0 0 20px #facc1555;
    border-radius: 12px; padding: 10px 16px;
    max-width: 560px; margin: 0 auto; text-align: center;
    animation: fadein .3s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #toast-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px; color: #facc15;
    text-shadow: 0 0 8px #facc15;
    margin-bottom: 6px; letter-spacing: .06em;
  }
  #toast-sub { font-size: 12px; color: #a78bfa; line-height: 1.5; }

  #sparks-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; pointer-events: none;
  }

  /* WIN */
  #win {
    display: none; text-align: center; margin-top: 1.5rem;
    background: #0d0020; border: 2px solid #facc15;
    box-shadow: 0 0 28px #facc1566;
    border-radius: 14px; padding: 1.5rem;
  }
  #win h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px; color: #facc15;
    text-shadow: 0 0 10px #facc15;
    margin-bottom: 10px; letter-spacing: .06em;
  }
  #win p { font-size: 13px; color: #a78bfa; margin-bottom: 16px; }
  #btn-r {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px; padding: 10px 20px;
    background: #7c3aed; color: #fff;
    border: 2px solid #e040fb; border-radius: 8px; cursor: pointer;
    letter-spacing: .08em; box-shadow: 0 0 12px #e040fb55;
    transition: background .2s;
  }
  #btn-r:hover { background: #e040fb; }

  /* RESPONSIVE */
  @media (max-width: 520px) {
    #board { grid-template-columns: repeat(4, 1fr); }
    #game-title { font-size: 11px; }
    .card { height: 86px; }
  }
  @media (max-width: 380px) {
    #board { grid-template-columns: repeat(4, 1fr); gap: 6px; }
    .card { height: 78px; }
    .cb-text { font-size: 9px; }
  }
</style>
</head>
<body>

<div id="gc">
  <div id="scanlines"></div>
  <div id="stars"></div>

  <div id="content">
    <div id="hdr">
      <div id="game-title">MEMORIA<br><span>CREATIVA</span></div>
      <div id="game-sub">— desafío del pensamiento —</div>
    </div>

    <div id="stats">
      <div class="stat"><div class="stat-v" id="sm">00</div><div class="stat-l">intentos</div></div>
      <div class="stat"><div class="stat-v" id="sp">0/10</div><div class="stat-l">parejas</div></div>
      <div class="stat"><div class="stat-v" id="st">0:00</div><div class="stat-l">tiempo</div></div>
    </div>

    <div id="legend">
      <span class="leg leg-c">azul = concepto</span>
      <span class="leg leg-m">verde = significado</span>
    </div>

    <div id="board"></div>

    <div id="toast-wrap">
      <canvas id="sparks-canvas"></canvas>
      <div id="toast">
        <div id="toast-title">★ ¡EXCELENTE! ★</div>
        <div id="toast-sub"></div>
      </div>
    </div>

    <div id="win">
      <h3>★ ¡NIVEL COMPLETADO! ★</h3>
      <p id="win-txt"></p>
      <button id="btn-r" onclick="buildBoard()">▶ JUGAR DE NUEVO</button>
    </div>
  </div>
</div>

<script>
const pairs = [
  { id:1,  concept:"Pensamiento Creativo",     meaning:"Capacidad de generar ideas nuevas, combinarlas y encontrar soluciones innovadoras a los problemas.",              msg:"¡La creatividad es la chispa que enciende el cambio! Cultivar este pensamiento transforma cómo resolvemos cualquier desafío." },
  { id:2,  concept:"Flexibilidad Psicológica", meaning:"Habilidad para adoptar múltiples puntos de vista y salir de lo convencional hacia lugares menos explorados.",     msg:"¡Mente abierta, mundo ilimitado! La flexibilidad nos permite ver lo que otros no ven." },
  { id:3,  concept:"Base de la Creatividad",   meaning:"Generación de contenido novedoso apoyado en gran cantidad de información y datos previos.",                       msg:"¡Sin conocimiento no hay creación! La creatividad nace de todo lo que hemos aprendido antes." },
  { id:4,  concept:"Modelado",                 meaning:"Método a través del cual se puede aprender la creatividad, demostrando que no es una facultad puramente innata.", msg:"¡La creatividad se aprende! Observar y practicar es el camino para desarrollarla." },
  { id:5,  concept:"Comportamiento Adaptativo",meaning:"Característica que define la creatividad como respuesta inteligente a los retos, sin necesidad de ser un genio.", msg:"¡Todos podemos ser creativos! La inteligencia adaptativa está al alcance de cada persona." },
  { id:6,  concept:"Conocimiento Profundo",    meaning:"Requisito indispensable para crear algo nuevo y evitar repetir lo que otros ya han dicho sobre un tema.",          msg:"¡Primero conoce, luego crea! Dominar un tema es el primer paso hacia la innovación real." },
  { id:7,  concept:"Efecto del Estrés",        meaning:"Factor que cierra el campo cognitivo y dificulta significativamente la aparición de nuevas ideas.",                msg:"¡Mente tranquila, ideas fluidas! Gestionar el estrés es clave para liberar tu creatividad." },
  { id:8,  concept:"Curiosidad Infantil",      meaning:"Actitud de exploración y búsqueda de novedades sin restricciones que impulsa a salir de la zona de confort.",     msg:"¡Pregunta como niño, crea como experto! La curiosidad es el motor de toda innovación." },
  { id:9,  concept:"Ventaja Organizacional",   meaning:"Mejora de productividad y motivación, logrando que el 76% de empleados se sientan más comprometidos.",            msg:"¡La creatividad también es negocio! Equipos creativos son más felices y más productivos." },
  { id:10, concept:"Trabajo en Equipo",        meaning:"Dinámica que fomenta la creatividad al ofrecer cambios de perspectiva y personas que sirven de inspiración.",     msg:"¡Juntos pensamos mejor! Cada persona aporta una chispa única a la creatividad colectiva." }
];

let cards=[], flipped=[], matched=[], moves=0, secs=0, timer=null, locked=false;

function fmt(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }
function shuffle(a){ return a.sort(()=>Math.random()-.5); }

function makeStars(){
  const c = document.getElementById('stars');
  c.innerHTML = '';
  for(let i=0;i<55;i++){
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random()*2.5+.5;
    s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${Math.random()*.7+.2};animation:twinkle ${(Math.random()*3+2).toFixed(1)}s infinite alternate`;
    c.appendChild(s);
  }
}
const ts = document.createElement('style');
ts.textContent = '@keyframes twinkle{from{opacity:.15}to{opacity:.9}}';
document.head.appendChild(ts);

function buildBoard(){
  cards = [];
  pairs.forEach(p => {
    cards.push({ id:p.id, type:'concept', text:p.concept,  msg:p.msg });
    cards.push({ id:p.id, type:'meaning', text:p.meaning, msg:p.msg });
  });
  shuffle(cards);

  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((c,i) => {
    const el = document.createElement('div');
    el.className = 'card';
    el.innerHTML = `<div class="ci">
      <div class="cf">
        <div class="cf-grid"></div>
        <i class="ti ti-diamond cf-icon" aria-hidden="true"></i>
        <span class="cf-lbl">${c.type==='concept'?'concepto':'significado'}</span>
      </div>
      <div class="cb ${c.type}">
        <span class="cb-badge">${c.type==='concept'?'concepto':'significado'}</span>
        <span class="cb-text">${c.text}</span>
      </div>
    </div>`;
    el.addEventListener('click', () => onCard(el, i));
    board.appendChild(el);
  });

  flipped=[]; matched=[]; moves=0; secs=0; locked=false;
  document.getElementById('sm').textContent = '00';
  document.getElementById('sp').textContent = '0/10';
  document.getElementById('st').textContent = '0:00';
  document.getElementById('toast').style.display = 'none';
  document.getElementById('win').style.display = 'none';
  clearInterval(timer);
  timer = setInterval(() => { secs++; document.getElementById('st').textContent = fmt(secs); }, 1000);
}

function onCard(el, idx){
  if(locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
  el.classList.add('flipped');
  flipped.push({ el, idx, data: cards[idx] });
  if(flipped.length === 2){
    moves++;
    document.getElementById('sm').textContent = String(moves).padStart(2,'0');
    locked = true;
    const [a, b] = flipped;
    if(a.data.id === b.data.id && a.data.type !== b.data.type){
      setTimeout(() => {
        a.el.classList.add('matched'); b.el.classList.add('matched');
        matched.push(a.data.id);
        document.getElementById('sp').textContent = matched.length+'/10';
        showToast(a.data.msg);
        launchSparks();
        flipped = []; locked = false;
        if(matched.length === 10) setTimeout(win, 1400);
      }, 380);
    } else {
      setTimeout(() => {
        a.el.classList.add('wrong'); b.el.classList.add('wrong');
        setTimeout(() => {
          a.el.classList.remove('flipped','wrong');
          b.el.classList.remove('flipped','wrong');
          flipped = []; locked = false;
          document.getElementById('toast').style.display = 'none';
        }, 700);
      }, 450);
    }
  }
}

function showToast(msg){
  document.getElementById('toast-sub').textContent = msg;
  document.getElementById('toast').style.display = 'block';
}

function launchSparks(){
  const canvas = document.getElementById('sparks-canvas');
  const wrap   = document.getElementById('toast-wrap');
  canvas.width  = wrap.offsetWidth;
  canvas.height = wrap.offsetHeight || 90;
  const ctx = canvas.getContext('2d');
  const colors = ['#facc15','#e040fb','#3b82f6','#10b981','#f97316','#a78bfa','#6ee7b7','#fff'];
  const sparks = Array.from({length:70}, () => ({
    x: canvas.width*.5 + (Math.random()-.5)*canvas.width*.6,
    y: canvas.height*.4,
    vx: (Math.random()-.5)*7,
    vy: -(Math.random()*6+1),
    r: Math.random()*3.5+1.5,
    color: colors[Math.floor(Math.random()*colors.length)],
    alpha: 1
  }));
  let t = 0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    sparks.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.vy += .14; s.alpha -= .016;
      ctx.globalAlpha = Math.max(s.alpha, 0);
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1; t++;
    if(t < 100) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

function win(){
  clearInterval(timer);
  document.getElementById('toast').style.display = 'none';
  document.getElementById('win-txt').textContent =
    `Completaste el juego en ${fmt(secs)} con ${moves} intentos. ¡Eres un genio creativo!`;
  document.getElementById('win').style.display = 'block';
  launchSparks();
}

makeStars();
buildBoard();
</script>
</body>
</html>
